<!--
  AndroidSpect canonical mark. Single source of truth - same proportions
  are used by:
    - the Android launcher icon foreground vector (res/drawable/ic_launcher_foreground.xml)
    - the web favicon (this file)
    - the inline header SVG in assets/web/index.html
    - the login overlay mark in assets/web/app.js
  Concept: device frame + lens ring + focal dot. Three shapes, two colors.
  No crosshairs, no extra ornaments. Looks the same at 16px and 108dp.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="AndroidSpect">
  <defs>
    <linearGradient id="as-bg" x1="0" y1="0" x2="64" y2="64">
      <stop offset="0" stop-color="#0E1117"/>
      <stop offset="1" stop-color="#07080B"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#as-bg)"/>
  <rect x="12" y="12" width="40" height="40" rx="9"
        fill="none" stroke="#F6F8FA" stroke-width="2.6" stroke-linejoin="round" opacity="0.92"/>
  <circle cx="32" cy="32" r="9.5" fill="none" stroke="#10D689" stroke-width="2.8"/>
  <circle cx="32" cy="32" r="3.2" fill="#10D689"/>
</svg>
